name: generate snake animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: drag88
          outputs: |
            dist/github-snake.svg?color_snake=#00FF41&color_dots=#0D0208,#003B11,#006B22,#00B233,#00FF41
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#00FF41&color_dots=#0D0208,#003B11,#006B22,#00B233,#00FF41

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
